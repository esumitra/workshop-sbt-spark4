services:
  spark-master:
    image: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./docker/input:/opt/spark/work-dir/input:ro
      - ./docker/output:/opt/spark/work-dir/output
    networks:
      - spark-net
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    restart: unless-stopped

  spark-worker-1:
    image: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g
    ports:
      - "8081:8081"
    volumes:
      - ./docker/input:/opt/spark/work-dir/input:ro
      - ./docker/output:/opt/spark/work-dir/output
      - ./docker/logs:/opt/spark/work-dir/logs
    networks:
      - spark-net
    command: ["/bin/sh", "-c", "mkdir -p /opt/spark/work-dir/logs && chmod 777 /opt/spark/work-dir/logs && /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"]
    restart: unless-stopped

  spark-worker-2:
    image: apache/spark:4.0.2-scala2.13-java17-python3-ubuntu
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8082
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g
    ports:
      - "8082:8082"
    volumes:
      - ./docker/input:/opt/spark/work-dir/input:ro
      - ./docker/output:/opt/spark/work-dir/output
      - ./docker/logs:/opt/spark/work-dir/logs
    networks:
      - spark-net
    command: ["/bin/sh", "-c", "mkdir -p /opt/spark/work-dir/logs && chmod 777 /opt/spark/work-dir/logs && /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"]
    restart: unless-stopped

  wordcount-submit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wordcount-submit
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./docker/input:/opt/spark/work-dir/input:ro
      - ./docker/output:/opt/spark/work-dir/output
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
